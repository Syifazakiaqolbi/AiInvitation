<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Invitation Generator</title>
    
    <!-- External Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: { 
                DEFAULT: '#b8860b', 
                light: '#d4a843', 
                dark: '#8b6914',
                50: '#fdf8ef'
              },
              secondary: { 
                DEFAULT: '#c2185b', 
                light: '#e91e8c', 
                dark: '#880e4f' 
              },
              cream: {
                DEFAULT: '#faf7f2',
                dark: '#f0ebe3'
              },
            },
            fontFamily: {
              script: ['Great Vibes', 'cursive'],
              elegant: ['Playfair Display', 'serif'],
              body: ['Inter', 'sans-serif'],
              arabic: ['Amiri', 'serif'],
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            animation: {
              'float': 'float 3.5s ease-in-out infinite',
              'fade-in': 'fadeIn 0.6s ease-out both',
              'fade-in-up': 'fadeInUp 0.7s ease-out both',
              'chevron': 'chevronBounce 1.5s ease-in-out infinite',
              'ornament': 'ornamentDrift 6s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-12px)' },
              },
              fadeIn: {
                'from': { opacity: '0' },
                'to': { opacity: '1' },
              },
              fadeInUp: {
                'from': { opacity: '0', transform: 'translateY(30px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              },
              chevronBounce: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(8px)' },
              },
              ornamentDrift: {
                '0%, 100%': { transform: 'rotate(0deg) scale(1)' },
                '50%': { transform: 'rotate(3deg) scale(1.02)' },
              },
            },
          },
        },
      }
    </script>
  </head>
  <body class="min-h-screen font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
